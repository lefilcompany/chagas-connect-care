name: Lint diagnostics

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  eslint-report:
    name: Relatório ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Gerar relatórios ESLint
        continue-on-error: true
        run: |
          mkdir -p test-results
          npx eslint . -f json -o test-results/eslint-report.json || true
          npx eslint . -f stylish > test-results/eslint-output.txt 2>&1 || true

      - name: Publicar diagnóstico
        uses: actions/upload-artifact@v4
        with:
          name: eslint-diagnostics
          path: test-results/eslint-*
          if-no-files-found: error
          retention-days: 3
