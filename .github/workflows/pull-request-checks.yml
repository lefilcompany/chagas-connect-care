name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Run tests
        shell: bash
        run: |
          npm test > test-output.log 2>&1 || {
            cat test-output.log
            exit 1
          }
          cat test-output.log
      - name: Build application
        shell: bash
        run: |
          npm run build > build-output.log 2>&1 || {
            cat build-output.log
            exit 1
          }
          cat build-output.log
